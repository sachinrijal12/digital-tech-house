<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <meta
    name="theme-color"
    content="#08111f"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <title>Digital Tech House | Web Development Company</title>

  <meta
    name="description"
    content="Digital Tech House is a professional web development company specializing in modern, responsive, secure, and high-performance websites for businesses and startups."
  />

  <meta
    name="keywords"
    content="Digital Tech House, Website Development, Web Design, React, JavaScript, E-commerce, UI UX, Responsive Website, Software Company, Nepal"
  />

  <meta
    name="author"
    content="Digital Tech House"
  />

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="Digital Tech House | Web Development Company"
  />

  <meta
    property="og:description"
    content="Professional website development services for businesses and startups."
  />

  <meta
    property="og:type"
    content="website"
  />

  <!-- Change after deployment -->
  <meta
    property="og:url"
    content="https://digitaltechhouse.com"
  />

  <!-- Replace with your final preview image -->
  <meta
    property="og:image"
    content="%PUBLIC_URL%/images/preview.png"
  />

  <meta
    property="og:site_name"
    content="Digital Tech House"
  />

  <!-- Twitter Card -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="Digital Tech House"
  />

  <meta
    name="twitter:description"
    content="Modern Website Development Company."
  />

  <meta
    name="twitter:image"
    content="%PUBLIC_URL%/images/preview.png"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    href="%PUBLIC_URL%/favicon.ico"
  />

  <!-- Apple Icon -->
  <link
    rel="apple-touch-icon"
    href="%PUBLIC_URL%/logo192.png"
  />

  <!-- Manifest -->
  <link
    rel="manifest"
    href="%PUBLIC_URL%/manifest.json"
  />

  <!-- Google Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <noscript>
    You need to enable JavaScript to run this application.
  </noscript>

  <div id="root"></div>

</body>

</html>
